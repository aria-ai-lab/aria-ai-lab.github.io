<header class="nav">
  <div class="wrap nav-inner">
    <a class="brand" href="{{ '/' | relative_url }}" aria-label="{{ site.title }} home">
      {% include wordmark.html scale="0.34" %}
      <span class="brand-div"></span>
      <span class="brand-label">{{ site.lab_label }}</span>
    </a>

    <button class="nav-toggle" aria-label="Toggle menu" aria-expanded="false">
      <span></span><span></span><span></span>
    </button>

    <nav class="nav-links" aria-label="Primary">
      {%- for item in site.nav -%}
      <a href="{{ item.url | relative_url }}"{% if page.url == item.url %} class="active" aria-current="page"{% endif %}>{{ item.name }}</a>
      {%- endfor -%}
      <a class="nav-join" href="mailto:{{ site.email }}?subject=Joining%20ARIA">Join</a>
      <button class="theme-toggle" id="themeToggle" aria-label="Toggle color theme" title="Toggle theme">
        <svg class="ic-svg ic-moon" viewBox="0 0 24 24" aria-hidden="true"><use href="#ic-moon"></use></svg>
        <svg class="ic-svg ic-sun" viewBox="0 0 24 24" aria-hidden="true"><use href="#ic-sun"></use></svg>
      </button>
    </nav>
  </div>
</header>
